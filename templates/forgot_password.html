{% extends "base.html" %}

{% block title %}HandShake | Reset Password{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 460px; margin: 60px auto;">
    <div class="auth-header" style="text-align: center;">
        <h2 style="font-weight: 800; letter-spacing: -1px;">Reset Password</h2>
        <p style="color: var(--text-secondary); margin-bottom: 28px;">Set a new password for your account.</p>
    </div>

    <form class="auth-form" action="{{ url_for('forgot_password') }}" method="POST">
        <div class="form-group">
            <input type="email" name="email" placeholder="Your account email" required>
        </div>
        <div class="form-group">
            <input type="password" name="new_password" placeholder="New password" minlength="6" required>
        </div>
        <div class="form-group">
            <input type="password" name="confirm_password" placeholder="Confirm new password" minlength="6" required>
        </div>

        <button type="submit" class="auth-btn" style="padding: 14px;">Reset Password</button>
    </form>

    <div class="auth-footer" style="margin-top: 18px;">
        Back to <a href="{{ url_for('login') }}">log in</a>
    </div>
</div>
{% endblock %}
