{% extends "base.html" %}

{% block title %}HandShake | Post Item{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <div class="auth-header">
        <h2>List your item on HandShake</h2>
        <p style="color: var(--text-secondary); margin-bottom: 24px;">Share your things with the community</p>
    </div>
    <form class="auth-form" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 4px;">What are you listing?</label>
            <input type="text" name="title" placeholder="e.g. PlayStation 5, Canon EOS R5" required>
        </div>
        <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 4px;">Category</label>
            <select name="category" style="padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: white;">
                <option value="hobbies">Hobbies (PS5, Skate, Canon...)</option>
                <option value="tech">Tech</option>
                <option value="cars">Cars</option>
                <option value="houses">Houses</option>
                <option value="tools">Tools</option>
                <option value="books">Books</option>
            </select>
        </div>
        <div style="display: flex; gap: 16px;">
            <div class="form-group" style="flex: 1;">
                <label style="font-weight: 600; margin-bottom: 4px;">Price (TMT)</label>
                <input type="number" name="price" placeholder="0" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label style="font-weight: 600; margin-bottom: 4px;">Transaction Type</label>
                <select name="type" style="padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; background: white;">
                    <option value="rent">Rent</option>
                    <option value="sell">Sell</option>
                    <option value="exchange">Exchange (Books)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 4px;">Location</label>
            <input type="text" name="loc" placeholder="e.g. Ashgabat, Berkarar" required>
        </div>
        <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 4px;">Description</label>
            <textarea name="description" placeholder="Tell us about your item..." style="padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; min-height: 120px; font-family: inherit;"></textarea>
        </div>
        <div class="form-group">
            <label style="font-weight: 600; margin-bottom: 4px;">Photo Upload (Max 5MB)</label>
            <input type="file" name="item_image" accept="image/*" required style="padding: 8px;">
        </div>
        <button type="submit" class="auth-btn">HandShake It!</button>
    </form>
</div>
{% endblock %}
